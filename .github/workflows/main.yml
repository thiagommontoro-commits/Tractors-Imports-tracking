name: Atualizar Dados de Importação

on:
  # Permite que você rode este fluxo de trabalho manualmente pela aba "Actions" do GitHub
  workflow_dispatch:

  # Roda automaticamente toda segunda-feira às 08:00 UTC (05:00 no horário de Brasília)
  schedule:
    - cron: '0 8 * * 1'

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      # 1. Baixa o código do seu repositório para o ambiente de execução
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configura o ambiente Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Instala as dependências listadas no requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Executa o script principal para baixar os dados e criar o Excel
      - name: Run data extraction script
        run: python Main.py

      # 5. Faz o commit do novo arquivo Excel gerado de volta para o seu repositório
      - name: Commit and push if it changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: Atualiza base de dados de importação'
