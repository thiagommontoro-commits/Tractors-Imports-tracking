# Nome do fluxo de trabalho que aparecerá na aba "Actions" do GitHub
name: Gerar Dashboard de Importações

# Define os gatilhos (eventos) que iniciam a automação
on:
  # Gatilho 1: Roda sempre que houver uma alteração na branch 'main'
  push:
    branches:
      - main

  # Gatilho 2: Permite que você rode a automação manualmente pela aba "Actions" do GitHub
  workflow_dispatch:

  # Gatilho 3: Agendamento para rodar semanalmente
  schedule:
    # A sintaxe cron '0 8 * * 1' significa:
    # Às 08:00 (UTC), toda Segunda-feira. (05:00 no horário de Brasília)
    - cron: '0 8 * * 1'

# Define as permissões que a automação terá no seu repositório
permissions:
  # 'contents: write' é essencial para permitir que a automação salve
  # os arquivos gerados (dashboard e excel) de volta no repositório.
  contents: write

# Define os "trabalhos" (jobs) que a automação irá executar
jobs:
  build-and-deploy:
    # O tipo de máquina virtual que será usada. 'ubuntu-latest' é o padrão.
    runs-on: ubuntu-latest

    # Lista de passos sequenciais que serão executados
    steps:
      - name: 1. Baixar o código do repositório
        # Esta é uma Action pronta do GitHub que clona seu repositório para a máquina virtual
        uses: actions/checkout@v4

      - name: 2. Configurar o ambiente Python
        # Action que instala a versão do Python que você precisa
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Instalar as bibliotecas necessárias
        # Executa os comandos para instalar as dependências listadas no seu arquivo requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Executar o script principal (Extração + Geração do Dashboard)
        # Este é o coração da automação: ele roda o seu script Python
        run: python Deixa.py

      - name: 4.1. (DEBUG) Listar arquivos no diretório
        # Este passo é útil para ver se os arquivos foram realmente criados no passo anterior
        run: ls -R

      - name: 5. Salvar os arquivos gerados no repositório
        # Executa uma série de comandos Git para salvar as alterações
        run: |
          # Configura o nome e e-mail do "robô" que fará o commit
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Adiciona o dashboard e o novo arquivo Excel (se houver) para serem salvos
          git add dashboard_importacoes.html "Imports database_*.xlsx"
          
          # Cria o commit apenas se houver mudanças. O '|| ...' evita que o workflow dê erro se não houver nada para commitar.
          git commit -m "📊 [Bot] Atualiza dashboard e base de dados" || echo "Nenhuma alteração para commitar"
          
          # Envia as alterações de volta para o seu repositório no GitHub
          git push
