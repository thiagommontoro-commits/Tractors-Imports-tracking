name: Gerar Dashboard de Importações

on:
  # Gatilho 1: Roda sempre que houver uma alteração na branch 'main'
  push:
    branches:
      - main

  # Gatilho 2: Permite que você rode a automação manualmente pela aba "Actions" do GitHub
  workflow_dispatch:

  # Gatilho 3: Agendamento para rodar toda segunda-feira às 08:00 UTC
  schedule:
    # A sintaxe cron '0 8 * * 1' significa: 0 minutos, 8 horas, todo dia do mês, todo mês, na segunda-feira.
    - cron: '0 8 * * 1'

# Permite que a automação salve os arquivos gerados (dashboard.html e o .xlsx) de volta no repositório
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Baixar o código do repositório
        uses: actions/checkout@v4

      - name: 2. Configurar o ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Instalar as bibliotecas necessárias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Executar o script principal (Extração + Geração do Dashboard)
        run: python Deixa.py

      - name: 5. Salvar os arquivos gerados no repositório
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add dashboard_importacoes.html "Imports database_*.xlsx"
          git commit -m "📊 [Bot] Atualiza dashboard e base de dados" || echo "Nenhuma alteração para commitar"
          git push
